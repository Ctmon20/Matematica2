<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Math | Raciocínio Rápido Tático</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --bg-dark: #050505;
            --card-bg: rgba(10, 10, 15, 0.95);
            --current-color: var(--neon-blue);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding-bottom: 140px; /* Espaço para as duas linhas de anúncio */
        }

        .app-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--current-color);
            text-shadow: 0 0 15px var(--current-color);
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.5s;
        }

        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--bg-dark) 95%, var(--current-color) 95%),
                              linear-gradient(90deg, var(--bg-dark) 95%, var(--current-color) 95%);
            background-size: 40px 40px;
            opacity: 0.1;
            z-index: -1;
            transition: 0.5s;
        }

        #game-hull {
            width: 92%;
            max-width: 400px;
            background: var(--card-bg);
            border: 2px solid var(--current-color);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .status-area {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-bottom: 5px;
        }

        .mini-stat {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 4px;
            border-radius: 4px;
        }

        .stat-label {
            display: block;
            font-size: 0.55rem;
            color: var(--current-color);
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 0.9rem;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
        }

        #timer-container {
            width: 45px;
            height: 45px;
            border: 2px solid var(--current-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .phase-name {
            grid-column: span 3;
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            font-family: 'Orbitron', sans-serif;
            margin-top: 5px;
        }

        #question {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            margin: 5px 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        #answer-visualizer {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--current-color);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba(255,255,255,0.1);
        }

        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 5px;
        }

        .key-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.1s;
        }

        .key-btn:active {
            background: var(--current-color);
            color: black;
            transform: scale(0.92);
            box-shadow: 0 0 15px var(--current-color);
        }

        .key-btn.key-action {
            grid-column: span 2;
            background: var(--current-color);
            color: black;
            font-size: 1.1rem;
            font-weight: 900;
        }

        .screen { display: none; flex-direction: column; gap: 10px; }
        .active { display: flex; }

        .sys-btn {
            background: var(--current-color);
            color: black;
            border: none;
            padding: 18px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            border-radius: 5px;
            cursor: pointer;
        }

        #ad-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            display: flex;
            flex-direction: column; /* Força um em cima do outro */
            align-items: center;
            justify-content: center;
            z-index: 1000;
            border-top: 1px solid var(--current-color);
            padding: 5px 0;
        }

        .ad-row {
            width: 100%;
            display: flex;
            justify-content: center;
            min-height: 55px; /* Altura mínima de cada linha */
        }

        .error-shake { animation: shake 0.4s; border-color: var(--neon-red) !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

    <div class="grid-bg" id="grid"></div>

    <h1 class="app-title" id="main-title">Raciocínio Rápido</h1>

    <div id="game-hull">
        <div id="start-screen" class="screen active">
            <p style="color: #666; font-size: 0.8rem; margin: 15px 0;">SISTEMA DE CALIBRAGEM NEON</p>
            <button class="sys-btn" onclick="startGame()">INICIAR PROTOCOLO</button>
        </div>

        <div id="game-screen" class="screen">
            <div class="status-area">
                <div class="mini-stat">
                    <span class="stat-label">SCORE</span>
                    <span class="stat-value" id="score">0</span>
                </div>
                
                <div id="timer-container"><span id="timer">60</span></div>
                
                <div class="mini-stat">
                    <span class="stat-label">ALVO</span>
                    <span class="stat-value" id="target">50</span>
                </div>

                <div class="phase-name" id="phase-label">FASE 1 // KERNEL</div>
            </div>

            <div id="question">--</div>
            
            <div id="answer-visualizer"></div>

            <div class="keyboard-grid">
                <div class="key-btn" onclick="pressKey('1')">1</div>
                <div class="key-btn" onclick="pressKey('2')">2</div>
                <div class="key-btn" onclick="pressKey('3')">3</div>
                <div class="key-btn" onclick="pressKey('4')">4</div>
                <div class="key-btn" onclick="pressKey('5')">5</div>
                <div class="key-btn" onclick="pressKey('6')">6</div>
                <div class="key-btn" onclick="pressKey('7')">7</div>
                <div class="key-btn" onclick="pressKey('8')">8</div>
                <div class="key-btn" onclick="pressKey('9')">9</div>
                <div class="key-btn" style="color:var(--neon-red)" onclick="pressKey('back')">⌫</div>
                <div class="key-btn" onclick="pressKey('0')">0</div>
                <div class="key-btn" onclick="pressKey('-')">-</div>
                <div class="key-btn key-action" onclick="submitAnswer()">CONFIRMAR</div>
            </div>
        </div>
    </div>

    <div id="ad-footer"></div>

    <script>
        // --- LÓGICA DE ATUALIZAÇÃO DOS ANÚNCIOS ---
        function refreshAds() {
            const adContainer = document.getElementById('ad-footer');
            adContainer.innerHTML = ''; // Limpa tudo

            // Criar duas linhas distintas
            const row1 = document.createElement('div');
            row1.className = 'ad-row';
            const row2 = document.createElement('div');
            row2.className = 'ad-row';
            
            adContainer.appendChild(row1);
            adContainer.appendChild(row2);

            // --- LINHA 1: ANÚNCIO 1 (Adsterra) ---
            const scriptConfig1 = document.createElement('script');
            scriptConfig1.text = `
                atOptions = {
                    'key' : '2a5e7302edec5e07fb8153e06aa96446',
                    'format' : 'iframe',
                    'height' : 50,
                    'width' : 320,
                    'params' : {}
                };
            `;
            const scriptInvoke1 = document.createElement('script');
            scriptInvoke1.src = 'https://www.highperformanceformat.com/2a5e7302edec5e07fb8153e06aa96446/invoke.js';
            
            row1.appendChild(scriptConfig1);
            row1.appendChild(scriptInvoke1);

            // --- LINHA 2: ANÚNCIO 2 (Surfe.pro) ---
            const scriptSurfeJS = document.createElement('script');
            scriptSurfeJS.src = '//static.surfe.pro/js/net.js';
            
            const insSurfe = document.createElement('ins');
            insSurfe.className = 'surfe-be';
            insSurfe.setAttribute('data-sid', '420510');
            
            const scriptSurfePush = document.createElement('script');
            scriptSurfePush.text = `(adsurfebe = window.adsurfebe || []).push({});`;

            row2.appendChild(scriptSurfeJS);
            row2.appendChild(insSurfe);
            row2.appendChild(scriptSurfePush);
        }

        refreshAds();
        setInterval(refreshAds, 30000); 

        // --- CÓDIGO ORIGINAL DO JOGO ---
        const phases = [
            { name: "FASE 1 // KERNEL", target: 50, color: "#00f3ff", ops: ['+'], range: 10 },
            { name: "FASE 2 // FIREWALL", target: 150, color: "#bc13fe", ops: ['+', '-'], range: 25 },
            { name: "FASE 3 // MAINFRAME", target: 400, color: "#39ff14", ops: ['*', '+'], range: 12 },
            { name: "FASE 4 // SINGULARITY", target: 1000, color: "#ff3131", ops: ['/', '*'], range: 20 }
        ];

        let currentPhase = 0, score = 0, timeLeft = 60, timerInterval, currentAnswer, playerAnswer = "";
        const hull = document.getElementById('game-hull'), mainTitle = document.getElementById('main-title'), answerVisualizer = document.getElementById('answer-visualizer');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'correct') {
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        function startGame() { 
            audioCtx.resume(); 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('game-screen').classList.add('active');
            updateUI(); newQuestion(); 
        }

        function startTimer() {
            timeLeft = 60; document.getElementById('timer').innerText = timeLeft;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--; document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) handleWrong();
            }, 1000);
        }

        function newQuestion() {
            playerAnswer = ""; answerVisualizer.innerText = "";
            const p = phases[currentPhase], op = p.ops[Math.floor(Math.random() * p.ops.length)];
            let n1, n2;
            if (op === '*') { n1 = Math.floor(Math.random() * 10) + 2; n2 = Math.floor(Math.random() * 10) + 2; }
            else if (op === '/') { n2 = Math.floor(Math.random() * 8) + 2; n1 = n2 * (Math.floor(Math.random() * 9) + 1); }
            else { n1 = Math.floor(Math.random() * p.range) + 1; n2 = Math.floor(Math.random() * p.range) + 1; }
            currentAnswer = eval(`${n1}${op}${n2}`);
            document.getElementById('question').innerText = `${n1}${op === '*' ? '×' : op === '/' ? '÷' : op}${n2}`;
            startTimer();
        }

        function pressKey(key) {
            if (key === 'back') playerAnswer = playerAnswer.slice(0, -1);
            else if (playerAnswer.length < 5) playerAnswer += key;
            answerVisualizer.innerText = playerAnswer;
        }

        function submitAnswer() {
            if (playerAnswer === "") return;
            if (parseInt(playerAnswer) === currentAnswer) {
                playSound('correct'); score += 10;
                document.getElementById('score').innerText = score;
                if (score >= phases[currentPhase].target && currentPhase < phases.length - 1) { currentPhase++; updateUI(); }
                newQuestion();
            } else { handleWrong(); }
        }

        function handleWrong() {
            playSound('wrong'); score = Math.max(0, score - 15);
            document.getElementById('score').innerText = score;
            hull.classList.add('error-shake');
            setTimeout(() => hull.classList.remove('error-shake'), 400);
            newQuestion();
        }

        function updateUI() {
            const p = phases[currentPhase];
            document.documentElement.style.setProperty('--current-color', p.color);
            document.getElementById('phase-label').innerText = p.name;
            document.getElementById('target').innerText = p.target;
            mainTitle.style.color = p.color;
            document.getElementById('ad-footer').style.borderColor = p.color;
        }
    </script>
</body>
</html>
